      - lang: TypeScript
        label: SDK upload helper
        source: |
          import { Blob } from "node:buffer";
          import { readFile } from "node:fs/promises";
          import {
            UploadsApi,
            uploadFile,
          } from "@liqhtworks/sophon-sdk";

          const uploads = new UploadsApi(config);
          const bytes = await readFile("input.mp4");
          const upload = await uploadFile({
            api: uploads,
            source: new Blob([bytes], { type: "video/mp4" }),
            fileName: "input.mp4",
            mimeType: "video/mp4",
            concurrency: 4,
            onProgress: (p) => console.log(`${p.partsDone}/${p.partsTotal} parts`),
          });

          // Pass this to createJob as JobSource.upload(upload.uploadId).
          console.log(upload.uploadId);
      - lang: curl
        label: curl (create session only)
        source: |
          curl -X POST https://api.liqhtworks.xyz/v1/uploads \
            -H "Authorization: Bearer $SOPHON_API_KEY" \
            -H "Idempotency-Key: video:123:v1:create-upload" \
            -H "Content-Type: application/json" \
            -d '{
              "file_name": "input.mp4",
              "file_size": 268435456,
              "mime_type": "video/mp4"
            }'
