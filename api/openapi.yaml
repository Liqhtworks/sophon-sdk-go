- description: Manage outbound terminal-job webhook endpoints.
  name: Webhooks
- description: |
    Outbound webhook payloads delivered by SOPHON when a job reaches a
    terminal state.

    ### Delivery semantics

    - **Trigger**: a delivery is enqueued when a job transitions to
      `completed`, `failed`, or `canceled`. No deliveries for
      `queued`, `running`, or interim `progress` events.
    - **Subscription**: only the webhooks listed in
      `CreateJobRequest.webhook_ids` for that specific job receive
      deliveries. Registering a webhook does not subscribe it
      retroactively or to all org jobs.
    - **Timeout**: each delivery attempt waits up to **10 seconds**
      for a 2xx response. Anything beyond that, or any non-2xx, is
      treated as a failure and triggers a retry.
    - **Retries**: up to **3 total attempts** (1 initial + 2 retries).
      Backoff between attempts is approximately **10s, then 60s**
      (the third gap, if it were used, would be 300s — but the 3rd
      attempt is the last). Deliveries that exhaust the retry budget
      are logged and dropped; there is no dead-letter queue the
      customer can inspect.
    - **Ordering**: not guaranteed. A consumer that needs strict
      ordering should treat `X-Turbo-Event-Id` as the dedupe key and
      reconcile state from `GET /v1/jobs/{id}` if events arrive out
      of order.
    - **At-least-once**: a delivery may be retried after a consumer's
      transient failure, so the same `event_id` can arrive more than
      once. Idempotent processing is required.
    - **Signature**: every delivery carries `X-Turbo-Signature-256`
      (HMAC-SHA256 of `"{X-Turbo-Timestamp}.{raw_body}"` using the
      per-webhook secret). Verify on the raw bytes BEFORE JSON-parsing.
  name: Webhook Events
- description: Resolve signed output download tokens.
  name: Downloads
- description: "Service health, readiness, version, and metrics endpoints."
  name: Health
- description: |
    Official SDKs are the recommended way to integrate SOPHON from
    server-side application code. Current published version: `0.1.5`.

    Repositories and package registries:

    | Language | Install | Links |
    |---|---|---|
    | TypeScript / JavaScript | `npm install @liqhtworks/sophon-sdk` | [npm](https://www.npmjs.com/package/@liqhtworks/sophon-sdk), [GitHub](https://github.com/Liqhtworks/sophon-sdk-typescript) |
    | Python | `pip install sophon-sdk` | [PyPI](https://pypi.org/project/sophon-sdk/), [GitHub](https://github.com/Liqhtworks/sophon-sdk-python) |
    | Go | `go get github.com/Liqhtworks/sophon-sdk-go@latest` | [GitHub](https://github.com/Liqhtworks/sophon-sdk-go) |

    ### Get an API key

    Create a server-side API key in the dashboard:
    https://sophon.rs/account/general

    ```bash
    export SOPHON_API_KEY=xt_live_...
    export SOPHON_BASE_URL=https://api.liqhtworks.xyz
    ```

    Keep API keys on the server. Do not ship them in browser bundles,
    mobile apps, public repositories, logs, or analytics events.

    ### What the helpers cover

    | Helper | Languages | Purpose |
    |---|---|---|
    | `uploadFile` / `upload_file` / `UploadFile` | TypeScript, Python, Go | Chunked upload orchestration with bounded concurrency, retries, resume, and progress callbacks. |
    | `JobSource.upload` / `JobSource.Upload` | TypeScript, Python, Go | Construct a typed upload-backed job source from a completed upload ID. |
    | `waitForJob` / `wait_for_job` / `WaitForJob` | TypeScript, Python, Go | Poll until a terminal job status with timeout and typed terminal/timeout errors. |
    | `verifyWebhookSignature` / `verify_webhook_signature` / `VerifyWebhookSignature` | TypeScript, Python, Go | Verify `X-Turbo-Signature-256` over the raw request body before JSON parsing. |

    ### TypeScript quickstart

    Requires Node 18+ or a runtime with `fetch`, `Blob`, `AbortController`,
    and Web Crypto.

    ```ts
    import { Blob } from "node:buffer";
    import { randomUUID } from "node:crypto";
    import { readFile, writeFile } from "node:fs/promises";
    import {
      Configuration,
      JobProfile,
      JobSource,
      JobStatus,
      JobsApi,
      UploadsApi,
      uploadFile,
      waitForJob,
    } from "@liqhtworks/sophon-sdk";

    const apiKey = process.env.SOPHON_API_KEY;
    if (!apiKey) throw new Error("SOPHON_API_KEY is required");

    const basePath = process.env.SOPHON_BASE_URL ?? "https://api.liqhtworks.xyz";
    const config = new Configuration({ basePath, accessToken: apiKey });
    const uploads = new UploadsApi(config);
    const jobs = new JobsApi(config);

    const bytes = await readFile("source.mov");
    const upload = await uploadFile({
      api: uploads,
      source: new Blob([bytes], { type: "video/quicktime" }),
      fileName: "source.mov",
      mimeType: "video/quicktime",
      concurrency: 4,
    });

    const job = await jobs.createJob({
      idempotencyKey: randomUUID(),
      createJobRequest: {
        source: JobSource.upload(upload.uploadId),
        profile: JobProfile.SOPHON_AUTO,
      },
    });

    const final = await waitForJob({
      api: jobs,
      jobId: job.id,
      timeoutMs: 30 * 60 * 1000,
    });
    if (final.status !== JobStatus.COMPLETED) {
      throw new Error(`job ended in ${final.status}`);
    }

    const redirect = await fetch(`${basePath}/v1/jobs/${final.id}/output`, {
      headers: { authorization: `Bearer ${apiKey}` },
      redirect: "manual",
    });
    const location = redirect.headers.get("location");
    if (!location) throw new Error("missing output redirect");

    const download = await fetch(new URL(location, basePath));
    await writeFile("sophon-output.mp4", Buffer.from(await download.arrayBuffer()));
    ```

    ### Python quickstart

    Requires Python 3.9+.

    ```python
    import os
    import urllib.parse
    import urllib.request
    import uuid
    from pathlib import Path

    import sophon_sdk
    from sophon_sdk.models.create_job_request import CreateJobRequest

    api_key = os.environ["SOPHON_API_KEY"]
    base_url = os.getenv("SOPHON_BASE_URL", "https://api.liqhtworks.xyz")

    class NoRedirectHandler(urllib.request.HTTPRedirectHandler):
        def http_error_302(self, req, fp, code, msg, headers):
            response = urllib.request.addinfourl(fp, headers, req.get_full_url())
            response.code = code
            return response

        http_error_301 = http_error_303 = http_error_307 = http_error_302

    configuration = sophon_sdk.Configuration(host=base_url, access_token=api_key)

    with sophon_sdk.ApiClient(configuration) as api_client:
        uploads = sophon_sdk.UploadsApi(api_client)
        jobs = sophon_sdk.JobsApi(api_client)

        upload = sophon_sdk.upload_file(
            uploads,
            Path("source.mov"),
            file_name="source.mov",
            mime_type="video/quicktime",
            concurrency=4,
        )

        job = sophon_sdk.create_job(
            jobs,
            idempotency_key=str(uuid.uuid4()),
            create_job_request=CreateJobRequest(
                source=sophon_sdk.JobSource.upload(upload.upload_id),
                profile="sophon-auto",
            ),
        )

        final = sophon_sdk.wait_for_job(jobs, job.id, timeout_seconds=30 * 60)
        if final.status != "completed":
            raise RuntimeError(f"job ended in {final.status}")

        req = urllib.request.Request(
            f"{base_url}/v1/jobs/{final.id}/output",
            headers={"Authorization": f"Bearer {api_key}"},
        )
        opener = urllib.request.build_opener(NoRedirectHandler())
        redirect = opener.open(req)
        location = redirect.headers.get("Location")
        if not location:
            raise RuntimeError("missing output redirect")

        download_url = urllib.parse.urljoin(base_url.rstrip("/") + "/", location)
        with urllib.request.urlopen(download_url, timeout=60) as response:
            Path("sophon-output.mp4").write_bytes(response.read())
    ```

    ### Go quickstart

    Requires Go 1.22+.

    ```go
    package main

    import (
        "context"
        "os"
        "time"

        sophon "github.com/Liqhtworks/sophon-sdk-go"
        "github.com/Liqhtworks/sophon-sdk-go/helpers"
        "github.com/google/uuid"
    )

    func main() {
        ctx := context.Background()
        apiKey := os.Getenv("SOPHON_API_KEY")
        baseURL := os.Getenv("SOPHON_BASE_URL")
        if baseURL == "" {
            baseURL = "https://api.liqhtworks.xyz"
        }

        cfg := sophon.NewConfiguration()
        cfg.Servers = sophon.ServerConfigurations{{URL: baseURL}}
        cfg.AddDefaultHeader("Authorization", "Bearer "+apiKey)
        client := sophon.NewAPIClient(cfg)

        uploads := helpers.NewUploadsClient(client.UploadsAPI)
        jobs := helpers.NewJobsClient(client.JobsAPI)

        reader, size, closeFn, err := helpers.OpenFileForUpload("source.mov")
        if err != nil {
            panic(err)
        }
        defer closeFn()

        upload, err := helpers.UploadFile(
            ctx,
            uploads,
            reader,
            size,
            "source.mov",
            "video/quicktime",
            helpers.UploadFileOptions{Concurrency: 4},
        )
        if err != nil {
            panic(err)
        }

        job, _, err := client.JobsAPI.CreateJob(ctx).
            IdempotencyKey(uuid.NewString()).
            CreateJobRequest(sophon.CreateJobRequest{
                Source: helpers.JobSource.Upload(upload.UploadID),
                Profile: sophon.SOPHON_AUTO,
            }).
            Execute()
        if err != nil {
            panic(err)
        }

        final, err := helpers.WaitForJob(ctx, jobs, job.GetId(), helpers.WaitForJobOptions{
            Timeout: 30 * time.Minute,
        })
        if err != nil {
            panic(err)
        }
        if final.Status != "completed" {
            panic("job ended in " + final.Status)
        }
    }
    ```

    ### Profile choice

    Use `sophon-auto` for production unless you need deterministic encoder
    settings. The SDK README quickstarts may use `sophon-espresso` for fast
    smoke tests, but production apps should default to `sophon-auto`.

    ### Webhooks

    Verify webhook signatures with the raw request body before JSON parsing.
    Complete server examples are available in each SDK repository:

    - TypeScript: Express
    - Python: FastAPI
    - Go: `net/http`
  name: SDKs
- description: |
    A real-world walkthrough of how [Daisy](https://daisy.so) wires SOPHON into
    two production flows — user-uploaded video compression and automatic
    post-generation encoding after video rendering. Both converge on the same
    adapter and state machine; only the source differs.

    The official SDKs cover the common upload, create-job, polling, and
    webhook-verification paths. The lower-level patterns below are useful
    when you need a custom HTTP adapter or a durable production state machine.

    ### 1. One thin adapter, one method per endpoint

    Keep the HTTP surface boring. Axios (or your stack's equivalent), a
    per-endpoint idempotency key, and profile names that the server validates:

    ```ts
    @Injectable()
    export class SophonService {
      private client() {
        return axios.create({
          baseURL: process.env.SOPHON_BASE_URL,
          headers: { Authorization: `Bearer ${process.env.SOPHON_API_KEY}` },
          timeout: 60_000,
        });
      }

      async createUploadSession(req, idempotencyKey) { /* POST /v1/uploads */ }
      async uploadChunk(uploadId, partNumber, bytes) { /* PUT /v1/uploads/{id}/parts/{n} */ }
      async completeUpload(uploadId, idempotencyKey) { /* POST /v1/uploads/{id}/complete */ }
      async createJob(req, idempotencyKey) { /* POST /v1/jobs */ }
      async getJob(id) { /* GET /v1/jobs/{id} */ }
      async downloadOutputStream(jobId) { /* GET /v1/jobs/{id}/output */ }
    }
    ```

    **Suffix idempotency keys per endpoint.** SOPHON scopes dedupe per route
    but a shared key collides across retries that hit different endpoints.
    Do this:

    ```ts
    const base = `video:${video.id}:v1`;
    await sophon.createUploadSession(req,  `${base}:create-upload`);
    await sophon.completeUpload(uploadId,  `${base}:complete-upload`);
    await sophon.createJob(req,            `${base}:create-job`);
    ```

    **Profile names are strings, not an enum.** We add and rename profiles
    (`sophon-espresso` → `sophon-auto` → future variants). A TypeScript union
    will drift; let the server validate.

    ### 2. Model your pipeline as a state machine

    Persist a single `sophonState` JSON column per row. `jobId === null`
    routes to dispatch; anything else polls that job:

    ```ts
    interface SophonState {
      jobId: string | null;          // null = not dispatched; string = poll it
      uploadId?: string;             // persist between upload + createJob
      profile?: string;              // sophon-auto | sophon-espresso | ...
      dispatchRetries: number;       // 3 strikes → fallback
      downloadRetries: number;
      lastError?: { stage, code, message, at };
    }

    // In your cron (5-second tick is plenty):
    if (state.jobId === null) {
      await dispatch(video, state);  // upload + createJob
    } else {
      await poll(video, state);      // getJob + (if completed) downloadAndComplete
    }
    ```

    Persisting `uploadId` between the upload completion and the `createJob`
    call matters — a crash in that window otherwise re-uploads the file.

    ### 3. Stream for large sources; buffer for small

    User-uploaded sources can be 1 GB+. Stream S3 → SOPHON in chunks equal
    to `session.chunk_size` from the createUploadSession response:

    ```ts
    async uploadStream(stream, fileName, mimeType, fileSize) {
      const session = await this.createUploadSession({
        file_name: fileName, file_size: fileSize, mime_type: mimeType,
      });
      let partIndex = 0, buffer = Buffer.alloc(0);
      for await (const chunk of stream) {
        buffer = Buffer.concat([buffer, chunk]);
        while (buffer.length >= session.chunk_size) {
          await this.uploadChunk(session.id, partIndex++,
            buffer.subarray(0, session.chunk_size));
          buffer = buffer.subarray(session.chunk_size);
        }
      }
      if (buffer.length > 0) {
        await this.uploadChunk(session.id, partIndex, buffer);
      }
      return this.completeUpload(session.id);
    }
    ```

    Generated outputs from a model run are typically <30 MB — for those, a
    buffered upload path is simpler and avoids managing a stream lifetime.

    ### 4. Always keep a fallback URL

    Before a row enters your encoding state, make sure the source is already
    playable from your CDN. Every SOPHON failure then degrades to "use the
    original" — the user's video never disappears because SOPHON is slow or
    down. This is the single most important invariant:

    ```ts
    await videoRepository.update({ id: video.id }, {
      videoUrl: sourceCloudfrontUrl,   // fallback URL, stays intact
      status: VideoStatus.EncodingPending,
      sophonState: { jobId: null, profile, dispatchRetries: 0, downloadRetries: 0 },
      sourceFileSize: sourceBytes,
    });
    ```

    On any terminal failure (structured `retryable: false`, retry budget
    exhausted, 404 on getJob, 23h stuck-row guard), flip status back to
    `Done` with `videoUrl` unchanged. SOPHON is enhancement, not a delivery
    dependency.

    ### 5. Handle the "no-gain" success path

    `sophon-auto` runs a pre-probe and, when it decides the output wouldn't
    be smaller than the source, returns `final_artifact: "original"` and
    `saved_percent: 0`. Skip the output download — the source already lives
    in your bucket:

    ```ts
    if (job.status === 'completed') {
      if (job.final_artifact === 'original') {
        // Persist outputFileSize = sourceFileSize so your UI shows
        // "no reduction" instead of a missing value.
        await completeWithFallbackOutput(video, job.output?.bytes ?? null);
        return;
      }
      await downloadAndComplete(video, state, job.output?.bytes ?? null);
    }
    ```

    ### 6. Finalize by streaming into your own storage

    `GET /v1/jobs/{id}/output` returns a 302 to a presigned URL with a 24h
    TTL. Stream that directly into your bucket — no temp file, no buffering:

    ```ts
    const { stream } = await sophon.downloadOutputStream(state.jobId);
    const outputKey = `encoded/${video.userId}/${video.id}.mp4`;
    await fileService.uploadStream(outputKey, stream, 'video/mp4');
    await videoRepository.update({ id: video.id }, {
      videoUrl: fileService.cloudfrontUrl(outputKey),
      outputFileSize: sophonOutputBytes,
      status: VideoStatus.Done,
    });
    ```

    ### 7. Failure taxonomy

    | Error | Handling |
    |---|---|
    | Structured `retryable: false` from SOPHON | Terminal. Fall back to `Done` with source URL. |
    | Retryable upload / createJob failure | Increment `dispatchRetries`; after 3, fall back. |
    | Retryable download failure | Increment `downloadRetries`; after 3, fall back. |
    | `getJob` → HTTP 404 | Terminal. Job expired or never created. Fall back. |
    | Transient poll network error | Do nothing; next tick retries. Don't burn retry budget. |
    | Row stuck in encode state > 23h | Fall back (safety net against orphans). |

    ### Minimal config

    ```bash
    SOPHON_API_KEY=xt_live_...
    SOPHON_BASE_URL=https://api.liqhtworks.xyz
    ```
  name: Integration example
paths:
  /v1/jobs:
    get:
      description: |
        Returns jobs for the authenticated organization ordered by creation
        time, with optional status filtering and opaque cursor pagination.
      operationId: listJobs
      parameters:
      - description: Filter by job status.
        explode: true
        in: query
        name: status
        required: false
        schema:
          $ref: "#/components/schemas/JobStatus"
        style: form
      - $ref: "#/components/parameters/LimitParam"
      - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsResponse"
          description: "Paginated list of jobs, ordered by created_at descending."
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Invalid status filter or cursor.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Missing or invalid credentials.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Insufficient scope (requires jobs:read).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
      security:
      - bearerApiKey: []
      - sessionCookie: []
      summary: List jobs with cursor pagination
      tags:
      - Jobs
    post:
      description: |
        Creates a queued encoding job from a completed upload source.

        **Picking `profile`:**
        - Use `sophon-auto` unless you have a specific reason not to. It
          picks per-source settings tuned for consistent output and
          re-encodes at stricter settings if the first pass doesn't
          hold up.
        - Use an explicit coffee profile (`sophon-espresso` / `-cortado` /
          `-americano`) when you want deterministic encoder behavior —
          same settings regardless of source.
        - Use an `-hq` variant when the source is a heavy format
          (ProRes, DNxHD, high-bitrate camera originals). Larger output
          files, maximum detail preservation.
        - Use an `-hq-10bit` variant when the source is 10-bit and you
          want to preserve that depth end-to-end (ProRes 422/4444,
          DNxHD, BRAW, camera masters).

        See `JobProfile` for the full enum.

        `output.target_height` requests an aspect-preserving downscale
        (width derived from source, both dims rounded to even). If absent
        or larger than source, output uses source dimensions.
      operationId: createJob
      parameters:
      - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
          description: Job created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: "Validation error (bad profile, source, container, metadata,\
            \ or webhook_ids)."
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Missing or invalid credentials.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Insufficient scope (requires jobs:create).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: "Idempotency conflict (same key, different request body)."
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Source is invalid or unsupported.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Rate limited or quota exceeded.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
      security:
      - bearerApiKey: []
      - sessionCookie: []
      summary: Submit an encoding job
      tags:
      - Jobs
      x-codeSamples:
      - lang: TypeScript
        label: SDK create job from upload
        source: |
          import { randomUUID } from "node:crypto";
          import {
            JobProfile,
            JobSource,
            JobsApi,
          } from "@liqhtworks/sophon-sdk";

          const jobs = new JobsApi(config);
          const job = await jobs.createJob({
            idempotencyKey: randomUUID(),
            createJobRequest: {
              source: JobSource.upload(uploadId),
              profile: JobProfile.SOPHON_AUTO,
              output: { container: "mp4", audio: true },
            },
          });

          // Persist jobId so the next cron tick polls instead of
          // re-dispatching. `null` means "not dispatched yet".
          await videoRepository.update({ id: video.id }, {
            sophonState: { ...state, jobId: job.id },
          });
      - lang: curl
        label: curl
        source: |
          curl -X POST https://api.liqhtworks.xyz/v1/jobs \
            -H "Authorization: Bearer $SOPHON_API_KEY" \
            -H "Idempotency-Key: video:123:v1:create-job" \
            -H "Content-Type: application/json" \
            -d '{
              "source":  { "type": "upload", "upload_id": "upl_…" },
              "profile": "sophon-auto",
              "output":  { "container": "mp4", "audio": true }
