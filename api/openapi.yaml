              schema:
                $ref: "#/components/schemas/ReadyResponse"
          description: One or more readiness checks failed.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
      security: []
      summary: Readiness probe
      tags:
      - Health
  /metrics:
    get:
      description: |
        Returns metrics in Prometheus text exposition format.
        This endpoint is operator-only and is not part of the public customer API.
        It should be firewalled from external traffic and scraped only by internal
        Prometheus infrastructure.
      operationId: metrics
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: Prometheus metrics.
      security: []
      summary: Prometheus metrics (operator-only)
      tags:
      - Health
      x-internal: true
components:
  headers:
    XRequestId:
      description: Unique ID for this request. Use in support tickets.
      explode: false
      schema:
        type: string
      style: simple
  parameters:
    IdempotencyKey:
      description: |
        Client-generated UUID or string for exactly-once semantics.
        Required on all POST endpoints. Replaying the same key with the
        same request body returns the original response without side effects.
      explode: false
      in: header
      name: Idempotency-Key
      required: true
      schema:
        maxLength: 128
        minLength: 1
        type: string
      style: simple
    CursorParam:
      description: Opaque pagination cursor returned in a previous response's `next_cursor`
        field.
      explode: true
      in: query
      name: cursor
      required: false
      schema:
        type: string
      style: form
    LimitParam:
      description: Maximum number of items to return per page.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 20
        maximum: 100
        minimum: 1
        type: integer
      style: form
  schemas:
    ErrorEnvelope:
      example:
        error:
          retryable: true
          code: validation_error
          message: message
          request_id: request_id
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
      required:
      - error
    ErrorBody:
      example:
        retryable: true
        code: validation_error
        message: message
        request_id: request_id
      properties:
        code:
          enum:
          - validation_error
          - unauthorized
          - forbidden
          - not_found
          - conflict
          - rate_limited
          - quota_exceeded
          - capacity_exceeded
          - source_invalid
          - source_unsupported
          - job_not_cancelable
          - output_not_ready
          - output_persistence_failed
          - internal_error
          type: string
        message:
          type: string
        retryable:
          description: |
            True for rate_limited, capacity_exceeded, and internal_error.
            Clients should retry with exponential backoff when true.
          type: boolean
        request_id:
          description: Server-assigned request ID for correlation with logs.
          type: string
          nullable: true
      required:
      - code
      - message
      - retryable
    JobMetadata:
      additionalProperties: true
      description: |
        Arbitrary JSON object attached to a job. Keys and values are passed
        through unchanged to webhook deliveries and echoed on job reads. The
        serialized representation must not exceed 16 KiB. Free-form; SDKs
        surface this as a `Record<string, unknown>` / `dict[str, Any]` /
        `map[string]interface{}` depending on language.
      type: object
    WebhookDeliveryPayload:
      description: |
        Payload delivered to registered webhook endpoints on terminal job events.
        Signed with HMAC-SHA256 over `"{timestamp}.{raw_body}"` using the
        per-webhook secret. Consumers must verify the signature before processing.
      example:
        metadata: ""
        event_id: evt_01JQabc123
        job_id: job_01JQ8C4K4W6YQ7M4M0A5K9T6RF
        type: job.completed
        timestamp: 2000-01-23T04:56:07.000+00:00
        status: completed
      properties:
        event_id:
          description: Unique delivery event ID for deduplication.
          example: evt_01JQabc123
          type: string
        type:
          description: Event type.
          enum:
          - job.completed
          - job.failed
          - job.canceled
          type: string
        timestamp:
          description: ISO 8601 timestamp of the event.
          format: date-time
          type: string
        job_id:
          description: The job that reached a terminal state.
          example: job_01JQ8C4K4W6YQ7M4M0A5K9T6RF
          type: string
        status:
          description: Terminal job status.
          enum:
          - completed
          - failed
          - canceled
          type: string
        metadata:
          allOf:
          - $ref: "#/components/schemas/JobMetadata"
          description: Opaque metadata from the original job submission.
      required:
      - event_id
      - job_id
      - metadata
      - status
      - timestamp
      - type
    JobProfile:
      description: |
        Encoding profile ID. Coffee-themed naming: prep time maps to encode
        speed (espresso = fast, cortado = medium, americano = slow). The
        naming suffixes compose:

        - bare name → 8-bit HEVC Main (universal decoder compatibility,
          default)
        - `-10bit` suffix → HEVC Main10 output. Requires a decoder that
          supports Main10 (modern phones, modern TVs, Safari, Chrome
          with hardware decode). Older / low-end devices may not play
          Main10 output. Pick only when you know the downstream
          pipeline supports it.
        - `-hq` suffix → quality-biased 8-bit variant for heavy source
          formats (ProRes, DNxHD, high-bitrate camera originals,
          mastering-grade intermediates). Files will be larger than
          the standard tier; pick when preserving detail matters more
          than bitrate. Broad device compatibility (8-bit Main).
        - `-hq-10bit` suffix → combines HQ with Main10 to preserve
          10-bit depth end-to-end. Same Main10 compatibility caveat
          as above; pick for ProRes 422/4444, DNxHD, BRAW, or camera
          masters where detail AND bit depth matter and you control
          the downstream pipeline.

        **For broad audience playback, pick `sophon-auto` or an explicit
        8-bit coffee profile.** `sophon-auto` produces 8-bit Main output
        regardless of source bit depth.

        If you're not sure which to pick, use `sophon-auto` — the API
        picks per-source settings tuned for consistent output regardless
        of what you submit, and automatically re-encodes at stricter
        settings if the first pass doesn't hold up.

        **8-bit (standard, default):**
        - `sophon-espresso` — fastest, lowest compression
        - `sophon-cortado` — balanced speed and quality
        - `sophon-americano` — slowest, highest compression

        **8-bit HQ** (max quality preservation for heavy formats):
        - `sophon-espresso-hq`
        - `sophon-cortado-hq`
        - `sophon-americano-hq`

        **10-bit (HEVC Main10):**
        - `sophon-espresso-10bit`
        - `sophon-cortado-10bit`
        - `sophon-americano-10bit`

        **10-bit HQ** (max quality preservation AND preserves 10-bit depth):
        - `sophon-espresso-hq-10bit`
        - `sophon-cortado-hq-10bit`
        - `sophon-americano-hq-10bit`

        **Adaptive dispatcher:**
        - `sophon-auto` — content-adaptive. The API probes each source,
          picks tuned settings, and re-encodes at stricter settings if
          the first pass doesn't hold up. `profile` on the job response
          stays `sophon-auto`; `effective_profile_id` records the
          concrete variant the API actually ran.
      enum:
      - sophon-espresso
      - sophon-cortado
      - sophon-americano
      - sophon-espresso-hq
      - sophon-cortado-hq
      - sophon-americano-hq
      - sophon-espresso-10bit
      - sophon-cortado-10bit
      - sophon-americano-10bit
      - sophon-espresso-hq-10bit
      - sophon-cortado-hq-10bit
      - sophon-americano-hq-10bit
      - sophon-auto
      example: sophon-auto
      type: string
    JobSourceType:
      description: Discriminator for `JobSource` variants.
      enum:
      - upload
      type: string
    UploadJobSource:
      description: Source backed by a completed chunked upload session.
      example:
        upload_id: upl_01JQ8abc123
        type: upload
      properties:
        type:
          $ref: "#/components/schemas/JobSourceType"
