  /v1/jobs/{id}/output:
    get:
      description: |
        Returns a 302 redirect to a signed download URL for the job's output file.
        The signed URL is valid for 24 hours.
      operationId: getJobOutput
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "302":
          description: |
            Redirect to signed download URL. The resolved resource is a video/mp4 file.
          headers:
            Location:
              description: Signed download URL (24-hour TTL). Resolves to video/mp4.
              explode: false
              schema:
                format: uri
                type: string
              style: simple
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Missing or invalid credentials.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Insufficient scope (requires outputs:read).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Job not found.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Output not ready (job not in completed state).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
      security:
      - bearerApiKey: []
      - sessionCookie: []
      summary: Get the encoded output file
      tags:
      - Jobs
      x-codeSamples:
      - lang: TypeScript
        label: "SDK poll, resolve 302, download"
        source: |
          import { writeFile } from "node:fs/promises";
          import { JobStatus, waitForJob } from "@liqhtworks/sophon-sdk";

          const final = await waitForJob({
            api: jobs,
            jobId,
            timeoutMs: 30 * 60 * 1000,
          });
          if (final.status !== JobStatus.COMPLETED) {
            throw new Error(`job ended in ${final.status}`);
          }

          // Use raw fetch so redirects are explicit. The SDK intentionally
          // does not follow the 302 and buffer the whole output in memory.
          const redirect = await fetch(`${basePath}/v1/jobs/${final.id}/output`, {
            headers: { authorization: `Bearer ${apiKey}` },
            redirect: "manual",
          });
          if (redirect.status !== 302) {
            throw new Error(`expected 302, got ${redirect.status}`);
          }
          const location = redirect.headers.get("location");
          if (!location) throw new Error("missing output redirect");

          const download = await fetch(new URL(location, basePath));
          await writeFile("sophon-output.mp4", Buffer.from(await download.arrayBuffer()));
      - lang: curl
        label: curl (follow 302 and save)
        source: |
          # -L follows the 302 to the presigned URL and streams the
          # output to stdout; here we pipe to a file.
          curl -L -o encoded.mp4 \
            -H "Authorization: Bearer $SOPHON_API_KEY" \
            https://api.liqhtworks.xyz/v1/jobs/job_abc123/output
