name: Go SDK CI

# Go has no registry — `go get github.com/Liqhtworks/sophon-sdk-go@vX.Y.Z`
# reads the tag directly. PRs, main pushes, and tags validate the generated
# module natively in the SDK repo.

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: go test + build + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - run: go test ./...
      - run: go build ./...
      - run: go vet ./...
      - name: Adapter splice present
        # helpers/adapters.go.tmpl is renamed to adapters.go upstream in
        # sophon-api during publish. If the rename fails, the helpers
        # package still compiles but consumers hit "undefined:
        # helpers.NewUploadsClient" with no actionable error. Catch that
        # here, in the SDK repo, where the consumer actually pulls from.
        run: |
          if ! grep -q "func NewUploadsClient" helpers/adapters.go; then
            echo "::error::helpers/adapters.go is missing NewUploadsClient — adapter splice did not run"
            exit 1
          fi
          if ! grep -q "func NewJobsClient" helpers/adapters.go; then
            echo "::error::helpers/adapters.go is missing NewJobsClient — adapter splice did not run"
            exit 1
          fi
          if ! grep -q "func NewDownloadsClient" helpers/adapters.go; then
            echo "::error::helpers/adapters.go is missing NewDownloadsClient — adapter splice did not run"
            exit 1
          fi
