name: Verify module

# Go has no registry — `go get github.com/Liqhtworks/sophon-sdk-go@vX.Y.Z`
# reads the tag directly. This workflow just runs `go build` + `go vet` on
# each tagged commit so broken tags surface immediately.

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: go build + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go vet ./...
